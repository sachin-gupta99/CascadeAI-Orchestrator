spring:
  application:
    name: CascadeAI-Orchestrator

  sql:
    init:
      mode: always

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 5000ms

aws:
  ssm:
    region: ap-south-1
  iam-user:
    access-key: /CascadeAI/access-key
    secret-key: /CascadeAI/secret-key

db:
  url: /CascadeAI/Orchestrator/postgres-db/url
  username: /CascadeAI/Orchestrator/postgres-db/username
  password: /CascadeAI/Orchestrator/postgres-db/password
  driver-class-name: org.postgresql.Driver

server:
  port: 8080

pipeline:
  senior-engineer-email: "[EMAIL_ADDRESS]"
  queue:
    # Channels published TO Python
    transcript-start: "pipeline:transcript:start"
    coding-approved: "pipeline:coding:approved"
    pr-approved: "pipeline:pr:approved"

    # Channels consumed FROM Python
    pipeline-start: "pipeline:start"
    transcript-done: "pipeline:transcript:done"
    requirements-done: "pipeline:requirements:done"
    pr-created: "pipeline:pr:created"
    complete: "pipeline:complete"
    failed: "pipeline:failed"

google:
  drive:
    credentials-path: ${GOOGLE_CREDENTIALS_PATH:classpath:gdriveCredentials.json}
    folder-id: /CascadeAI/gdrive/folderId

logging:
  level:
    com.pipeline: DEBUG
    org.springframework.data.redis: INFO
